# 스케줄 재활성화 2026-03-20

name: 📬 Platform Planner Daily Brief


on:
  schedule:
    # KST 09:00 목표 — GitHub Actions 무료플랜 최대 5h 지연 감안해 UTC 19:00 (전날) 설정
    # UTC 19:00 = KST 04:00 출발 → 지연 포함 KST 09:00 전후 도착 예상
    - cron: "0 19 * * *"
  workflow_dispatch: # 수동 실행 허용

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 데일리 브리프 실행
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          SMTP_EMAIL:          ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD:       ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL:            ${{ secrets.TO_EMAIL }}
        run: python newsletter/send_newsletter.py

      - name: HTML 미리보기 아티팩트 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brief-preview-${{ github.run_number }}
          path: newsletter/brief_preview.html
          retention-days: 7
