<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 600; }
  .ts { font-size: 12px; font-weight: 400; }
  .step-circle { fill: #7F77DD; }
  .step-num { fill: #fff; font-size: 13px; font-weight: 700; }
  .card { fill: #f5f5f5; stroke: #ddd; stroke-width: 0.5; }
  .code-bg { fill: #fff; stroke: #e0e0e0; stroke-width: 0.5; }
  .mono { font-family: 'SFMono-Regular', Consolas, monospace; }
  .kw { fill: #534AB7; }
  .str { fill: #0F6E56; }
  .var { fill: #E24B4A; }
  .muted { fill: #666; }
  .teal-btn { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
  .teal-text { fill: #085041; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="820" fill="#fafafa"/>

<!-- Title -->
<text class="th" x="340" y="38" text-anchor="middle" font-size="17" fill="#111">Claude Desktop에서 GitHub MCP 연결하기</text>
<line x1="40" y1="52" x2="640" y2="52" stroke="#ddd" stroke-width="0.5"/>

<!-- STEP 1 -->
<circle cx="54" cy="82" r="14" class="step-circle"/>
<text class="step-num" x="54" y="87" text-anchor="middle">1</text>
<text class="th" x="80" y="87">GitHub Personal Access Token 발급</text>

<rect x="40" y="104" width="600" height="108" rx="8" class="card"/>
<rect x="52" y="114" width="576" height="26" rx="6" class="code-bg"/>
<circle cx="68" cy="127" r="4" fill="#E24B4A" opacity="0.7"/>
<circle cx="84" cy="127" r="4" fill="#EF9F27" opacity="0.7"/>
<circle cx="100" cy="127" r="4" fill="#639922" opacity="0.7"/>
<text class="ts muted" x="340" y="130" text-anchor="middle" dominant-baseline="central">github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</text>

<rect x="52" y="148" width="180" height="28" rx="6" class="code-bg"/>
<text class="ts" x="62" y="162" dominant-baseline="central">✓  repo (전체 선택)</text>
<rect x="244" y="148" width="160" height="28" rx="6" class="code-bg"/>
<text class="ts" x="254" y="162" dominant-baseline="central">✓  workflow</text>
<rect x="416" y="148" width="120" height="28" rx="6" class="code-bg"/>
<text class="ts" x="426" y="162" dominant-baseline="central">✓  read:org</text>
<text class="ts muted" x="52" y="200">→ 생성된 토큰(ghp_...) 복사 후 안전한 곳에 보관</text>

<!-- STEP 2 -->
<circle cx="54" cy="242" r="14" class="step-circle"/>
<text class="step-num" x="54" y="247" text-anchor="middle">2</text>
<text class="th" x="80" y="247">Claude Desktop 설정 파일 열기</text>

<rect x="40" y="264" width="600" height="130" rx="8" class="card"/>
<rect x="52" y="274" width="100" height="26" rx="6" class="code-bg"/>
<text class="ts" x="102" y="287" text-anchor="middle" dominant-baseline="central">macOS</text>
<rect x="164" y="274" width="100" height="26" rx="6" fill="#eee" stroke="#ddd" stroke-width="0.5"/>
<text class="ts muted" x="214" y="287" text-anchor="middle" dominant-baseline="central">Windows</text>
<rect x="52" y="308" width="576" height="30" rx="4" class="code-bg"/>
<text class="ts mono muted" x="66" y="323" dominant-baseline="central">macOS:    ~/Library/Application Support/Claude/claude_desktop_config.json</text>
<rect x="52" y="346" width="576" height="30" rx="4" class="code-bg"/>
<text class="ts mono muted" x="66" y="361" dominant-baseline="central">Windows:  %APPDATA%\Claude\claude_desktop_config.json</text>

<!-- STEP 3 -->
<circle cx="54" cy="426" r="14" class="step-circle"/>
<text class="step-num" x="54" y="431" text-anchor="middle">3</text>
<text class="th" x="80" y="431">설정 파일에 MCP 서버 추가</text>

<rect x="40" y="448" width="600" height="226" rx="8" class="card"/>
<rect x="52" y="458" width="576" height="24" rx="4" class="code-bg"/>
<text class="ts mono muted" x="66" y="470" dominant-baseline="central">claude_desktop_config.json</text>
<rect x="52" y="488" width="576" height="176" rx="4" class="code-bg"/>
<text class="ts mono" x="66" y="506">{
</text>
<text font-family="'SFMono-Regular', Consolas, monospace" font-size="12">
  <tspan x="66" y="523">  </tspan><tspan class="kw">"mcpServers"</tspan><tspan>: {</tspan>
  <tspan x="66" dy="17">    </tspan><tspan class="kw">"github"</tspan><tspan>: {</tspan>
  <tspan x="66" dy="17">      </tspan><tspan class="kw">"command"</tspan><tspan>: </tspan><tspan class="str">"npx"</tspan><tspan>,</tspan>
  <tspan x="66" dy="17">      </tspan><tspan class="kw">"args"</tspan><tspan>: [</tspan><tspan class="str">"-y"</tspan><tspan>, </tspan><tspan class="str">"@modelcontextprotocol/server-github"</tspan><tspan>],</tspan>
  <tspan x="66" dy="17">      </tspan><tspan class="kw">"env"</tspan><tspan>: { </tspan><tspan class="kw">"GITHUB_PERSONAL_ACCESS_TOKEN"</tspan><tspan>: </tspan><tspan class="var">"ghp_YOUR_TOKEN"</tspan><tspan> }</tspan>
  <tspan x="66" dy="17">    }</tspan>
  <tspan x="66" dy="17">  }</tspan>
  <tspan x="66" dy="17">}</tspan>
</text>

<!-- STEP 4 -->
<circle cx="54" cy="706" r="14" class="step-circle"/>
<text class="step-num" x="54" y="711" text-anchor="middle">4</text>
<text class="th" x="80" y="711">Claude Desktop 재시작 후 연결 확인</text>

<rect x="40" y="728" width="600" height="68" rx="8" class="card"/>
<rect x="56" y="742" width="174" height="28" rx="6" class="teal-btn"/>
<text class="ts teal-text" x="143" y="756" text-anchor="middle" dominant-baseline="central">Claude Desktop 재시작</text>
<line x1="232" y1="756" x2="258" y2="756" stroke="#888" marker-end="url(#arrow)"/>
<rect x="260" y="742" width="148" height="28" rx="6" class="teal-btn"/>
<text class="ts teal-text" x="334" y="756" text-anchor="middle" dominant-baseline="central">채팅창 우하단 확인</text>
<line x1="410" y1="756" x2="436" y2="756" stroke="#888" marker-end="url(#arrow)"/>
<rect x="438" y="742" width="160" height="28" rx="6" class="teal-btn"/>
<text class="ts teal-text" x="518" y="756" text-anchor="middle" dominant-baseline="central">🔧 MCP 아이콘 표시됨</text>

<text class="ts muted" x="340" y="810" text-anchor="middle">Node.js 설치 필요 (node -v 로 확인) · npx가 자동으로 서버 패키지를 설치합니다</text>
</svg>