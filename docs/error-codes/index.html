<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>결제 플랫폼 에러코드 뷰어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#eeecea;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a96;
  --border:#e0deda;--border2:#c8c6c2;
  --blue-bg:#e6f1fb;--blue-text:#0c447c;--blue-border:#185fa5;
  --green-bg:#e1f5ee;--green-text:#085041;
  --amber-bg:#faeeda;--amber-text:#633806;
  --red-bg:#fcebeb;--red-text:#791f1f;
  --purple-bg:#eeedfe;--purple-text:#3c3489;
  --fatal-bg:#fcebeb;--fatal-text:#a32d2d;
  --error-bg:#fef9c3;--error-text:#854f0b;
  --warn-bg:#faeeda;--warn-text:#633806;
  --info-bg:#e6f1fb;--info-text:#185fa5;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;
    --text:#e8e6e0;--text2:#9a9a96;--text3:#6b6b67;
    --border:#3a3a36;--border2:#4a4a46;
    --blue-bg:#0c447c;--blue-text:#b5d4f4;--blue-border:#378add;
    --green-bg:#085041;--green-text:#9fe1cb;
    --amber-bg:#633806;--amber-text:#fac775;
    --red-bg:#791f1f;--red-text:#f7c1c1;
    --purple-bg:#3c3489;--purple-text:#cecbf6;
    --fatal-bg:#501313;--fatal-text:#f09595;
    --error-bg:#412402;--error-text:#fac775;
    --warn-bg:#412402;--warn-text:#fac775;
    --info-bg:#042c53;--info-text:#85b7eb;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
header{background:var(--bg);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-weight:600;font-size:15px;color:var(--text)}
.logo span{font-weight:400;color:var(--text2);margin-left:6px;font-size:13px}
.gh-link{font-size:12px;color:var(--text2);text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;display:flex;align-items:center;gap:5px}
.gh-link:hover{background:var(--bg2)}
main{max-width:1100px;margin:0 auto;padding:20px 24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border-radius:var(--radius);padding:12px 14px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:5px}
.stat-val{font-size:22px;font-weight:600;color:var(--text)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.toolbar input,.toolbar select{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue-border)}
.toolbar input{flex:1;min-width:200px}
.toolbar select{min-width:130px}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg)}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead{background:var(--bg2)}
th{padding:10px 12px;text-align:left;font-weight:500;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg2)}
tbody tr.active td{background:var(--blue-bg)}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500}
.lvl-FATAL{background:var(--fatal-bg);color:var(--fatal-text)}
.lvl-ERROR{background:var(--error-bg);color:var(--error-text)}
.lvl-WARN{background:var(--warn-bg);color:var(--warn-text)}
.lvl-INFO{background:var(--info-bg);color:var(--info-text)}
.rtag{display:inline-block;width:20px;height:20px;border-radius:4px;font-size:10px;font-weight:600;text-align:center;line-height:20px;margin-right:2px}
.rK{background:var(--green-bg);color:var(--green-text)}
.rA{background:var(--blue-bg);color:var(--blue-text)}
.rT{background:var(--amber-bg);color:var(--amber-text)}
.rJ{background:var(--red-bg);color:var(--red-text)}
.rN{background:var(--bg3);color:var(--text3);opacity:.5}
.reuse-pill{background:var(--purple-bg);color:var(--purple-text);font-size:10px;padding:1px 7px;border-radius:100px}
.action-tag{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:5px;font-size:11px;padding:2px 7px;color:var(--text2);margin-right:3px;margin-bottom:2px;white-space:nowrap}
.detail{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-top:14px}
.detail-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.detail-code{font-family:monospace;font-size:15px;font-weight:600}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px}
.detail-field{display:flex;flex-direction:column;gap:4px}
.detail-field.full{grid-column:1/-1}
.field-key{font-size:11px;color:var(--text2);font-weight:500}
.field-val{color:var(--text)}
.msg-box{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;font-size:13px;color:var(--text)}
.map-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.map-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:8px}
.map-item{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:6px;font-size:12px}
.map-item-name{font-weight:500;color:var(--text);margin-bottom:3px}
.map-item-meta{color:var(--text2);display:flex;gap:10px;flex-wrap:wrap}
.close-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text2)}
.close-btn:hover{background:var(--bg2)}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.region-wrap{display:flex;gap:2px;flex-wrap:wrap}
footer{text-align:center;padding:24px;color:var(--text3);font-size:12px;border-top:1px solid var(--border);margin-top:32px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr}.toolbar select{min-width:auto}}
</style>
</head>
<body>

<header>
  <div class="logo">결제 플랫폼 에러코드 뷰어 <span>Payment Error Codes</span></div>
  <a class="gh-link" href="https://github.com/seonyoungnc-ops/seonyoung/tree/main/payment-error-codes" target="_blank">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    GitHub
  </a>
</header>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-label">전체 에러코드</div><div class="stat-val" id="s-total">-</div></div>
    <div class="stat"><div class="stat-label">재사용 코드</div><div class="stat-val" id="s-reuse">-</div></div>
    <div class="stat"><div class="stat-label">FATAL / ERROR</div><div class="stat-val" id="s-critical">-</div></div>
    <div class="stat"><div class="stat-label">현재 표시</div><div class="stat-val" id="s-shown">-</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="코드 · 에러명 · 원인 검색..." oninput="render()">
    <select id="cat" onchange="render()">
      <option value="">전체 분류</option>
      <option>공통</option><option>주문서</option><option>결제 수단</option><option>보호자 동의</option><option>환불/취소</option>
    </select>
    <select id="region" onchange="render()">
      <option value="">전체 권역</option>
      <option value="K">한국 (K)</option><option value="A">글로벌 (A)</option>
      <option value="T">대만·홍콩·마카오 (T)</option><option value="J">일본 (J)</option>
    </select>
    <select id="level" onchange="render()">
      <option value="">전체 레벨</option>
      <option>FATAL</option><option>ERROR</option><option>WARN</option><option>INFO</option>
    </select>
    <select id="reuse" onchange="render()">
      <option value="">재사용 전체</option>
      <option value="Y">재사용 코드만</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <colgroup>
        <col style="width:110px"><col style="width:160px"><col style="width:200px">
        <col style="width:auto"><col style="width:200px">
      </colgroup>
      <thead>
        <tr>
          <th>Value</th>
          <th>Name</th>
          <th>Case</th>
          <th>문구</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div id="detail"></div>
</main>

<footer>
  데이터 원본: <a href="https://github.com/seonyoungnc-ops/seonyoung/tree/main/payment-error-codes" target="_blank" style="color:var(--blue-text)">seonyoungnc-ops/seonyoung</a>
  &nbsp;·&nbsp; JSON 수정 후 PR → merge 시 자동 반영
</footer>

<script>
const DATA = {
  common:[
    {code:"CMN_001",name_ko:"서버 내부 오류",name_en:"Internal server error",category:"공통",http_status:500,level:"FATAL",regions:{K:true,A:true,T:true,J:true},reusable:false,reuse_cases:[],message_ko:"일시적인 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.",message_en:"A temporary error occurred. Please try again later.",cause:"서버 내부 처리 오류",guide:"재시도 안내, 지속 시 고객센터 연결",actions:["재시도 버튼 제공","고객센터 연결"],registered_at:"2024-01-01",updated_at:"2024-01-01"},
    {code:"CMN_002",name_ko:"요청 값 오류",name_en:"Invalid request parameter",category:"공통",http_status:400,level:"ERROR",regions:{K:true,A:true,T:true,J:true},reusable:true,reuse_cases:["주문서","결제 수단","환불"],message_ko:"입력 값을 확인해 주세요.",message_en:"Please check your input values.",cause:"필수 파라미터 누락 또는 형식 오류",guide:"클라이언트 입력값 검증 로직 확인",actions:["입력 폼 포커스","오류 필드 강조"],registered_at:"2024-01-01",updated_at:"2024-11-01"}
  ],
  order:[
    {code:"ORD_001",name_ko:"주문 정보 없음",name_en:"Order not found",category:"주문서",http_status:404,level:"ERROR",regions:{K:true,A:true,T:true,J:true},reusable:false,reuse_cases:[],message_ko:"주문 정보를 찾을 수 없습니다.",message_en:"Order information not found.",cause:"주문 ID가 유효하지 않거나 만료됨",guide:"주문 목록 재조회 또는 고객센터 안내",actions:["주문 목록으로 이동","고객센터 연결"],registered_at:"2024-01-10",updated_at:"2024-01-10"},
    {code:"ORD_002",name_ko:"주문 시간 만료",name_en:"Order session expired",category:"주문서",http_status:408,level:"WARN",regions:{K:true,A:true,T:true,J:true},reusable:true,reuse_cases:["결제 수단 선택 화면","최종 확인 화면"],message_ko:"주문 유효 시간이 만료되었습니다. 다시 시도해 주세요.",message_en:"Order session has expired. Please try again.",cause:"주문 세션 타임아웃",guide:"주문서 재생성 유도",actions:["창 닫기","주문서 재생성"],registered_at:"2024-01-10",updated_at:"2024-05-20"}
  ],
  payment:[
    {code:"PAY_001",name_ko:"결제 수단 미등록",name_en:"Payment method not registered",category:"결제 수단",http_status:400,level:"ERROR",regions:{K:true,A:true,T:true,J:true},reusable:false,reuse_cases:[],message_ko:"결제 수단을 먼저 등록해 주세요.",message_en:"Please register a payment method first.",cause:"유효한 결제 수단이 없음",guide:"결제 수단 등록 페이지로 안내",actions:["결제 수단 등록 페이지 이동"],registered_at:"2024-01-01",updated_at:"2024-06-01"},
    {code:"PAY_002",name_ko:"잔액 부족",name_en:"Insufficient balance",category:"결제 수단",http_status:402,level:"ERROR",regions:{K:true,A:true,T:false,J:true},reusable:false,reuse_cases:[],message_ko:"잔액이 부족합니다. 결제 수단을 확인해 주세요.",message_en:"Insufficient balance. Please check your payment method.",cause:"결제 가능 금액 초과",guide:"충전 또는 다른 결제 수단 선택 안내",actions:["충전 페이지 이동","다른 결제 수단 선택"],registered_at:"2024-01-01",updated_at:"2024-07-15"}
  ],
  guardian:[
    {code:"GUARD_001",name_ko:"보호자 동의 미완료",name_en:"Parental consent not completed",category:"보호자 동의",http_status:403,level:"ERROR",regions:{K:true,A:false,T:false,J:true},reusable:false,reuse_cases:[],message_ko:"보호자 동의가 필요합니다.",message_en:"Parental consent is required.",cause:"미성년자 결제 시 보호자 동의 절차 미이행",guide:"보호자 동의 프로세스 재시작",actions:["보호자 동의 화면 이동","창 닫기"],registered_at:"2024-02-01",updated_at:"2024-08-01"},
    {code:"GUARD_002",name_ko:"보호자 동의 시간 초과",name_en:"Parental consent timeout",category:"보호자 동의",http_status:408,level:"WARN",regions:{K:true,A:false,T:false,J:true},reusable:false,reuse_cases:[],message_ko:"보호자 동의 대기 시간이 초과되었습니다.",message_en:"Parental consent request has timed out.",cause:"보호자 동의 대기 제한 시간 초과",guide:"보호자 동의 재요청 안내",actions:["재요청 버튼 제공","창 닫기"],registered_at:"2024-02-01",updated_at:"2024-02-01"}
  ],
  refund:[
    {code:"REFUND_001",name_ko:"환불 기간 초과",name_en:"Refund period exceeded",category:"환불/취소",http_status:422,level:"ERROR",regions:{K:true,A:true,T:true,J:true},reusable:false,reuse_cases:[],message_ko:"환불 가능 기간이 초과되었습니다.",message_en:"The refund period has exceeded.",cause:"환불 정책 기간 이후 요청",guide:"환불 불가 안내 및 고객센터 연결",actions:["창 닫기","고객센터 연결"],registered_at:"2024-03-01",updated_at:"2024-03-01"},
    {code:"REFUND_002",name_ko:"이미 취소된 주문",name_en:"Order already cancelled",category:"환불/취소",http_status:409,level:"WARN",regions:{K:true,A:true,T:true,J:true},reusable:true,reuse_cases:["환불 요청","취소 요청"],message_ko:"이미 취소된 주문입니다.",message_en:"This order has already been cancelled.",cause:"중복 취소 요청",guide:"주문 상태 재조회 안내",actions:["창 닫기","주문 상태 재조회"],registered_at:"2024-03-01",updated_at:"2024-09-10"}
  ]
};

const MAPPINGS=[
  {error_code:"ORD_002",case_id:"CASE-001",case_name:"주문 최종 확인 화면에서 뒤로가기 후 재결제",regions:["K","A","T","J"],trigger:"사용자가 결제 확인 후 취소하고 동일 주문 재결제",priority:"높음",owner:"기획팀"},
  {error_code:"ORD_002",case_id:"CASE-002",case_name:"결제 수단 변경 화면에서 세션 만료 후 재시도",regions:["K","A","T","J"],trigger:"결제 수단 변경 중 세션 타임아웃 발생",priority:"중간",owner:"개발팀"},
  {error_code:"CMN_002",case_id:"CASE-003",case_name:"주문서 생성 시 필수값 누락",regions:["K","A","T","J"],trigger:"상품 ID 또는 수량 파라미터 누락",priority:"높음",owner:"개발팀"},
  {error_code:"CMN_002",case_id:"CASE-004",case_name:"결제 수단 등록 시 카드 번호 형식 오류",regions:["K","A"],trigger:"카드 번호 16자리 형식 불일치",priority:"높음",owner:"개발팀"},
  {error_code:"REFUND_002",case_id:"CASE-005",case_name:"환불 처리 완료 후 동일 요청 재전송",regions:["K","A","T","J"],trigger:"네트워크 오류로 인한 중복 환불 요청",priority:"중간",owner:"개발팀"}
];

const allData = Object.values(DATA).flat();
let selected = null;

function init(){
  document.getElementById('s-total').textContent = allData.length;
  document.getElementById('s-reuse').textContent = allData.filter(d=>d.reusable).length;
  document.getElementById('s-critical').textContent = allData.filter(d=>d.level==='FATAL'||d.level==='ERROR').length;
  render();
}

function render(){
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('cat').value;
  const rgn = document.getElementById('region').value;
  const lvl = document.getElementById('level').value;
  const reuse = document.getElementById('reuse').value;

  const filtered = allData.filter(d=>{
    if(q && !`${d.code}${d.name_ko}${d.name_en}${d.cause}`.toLowerCase().includes(q)) return false;
    if(cat && d.category!==cat) return false;
    if(rgn && !d.regions[rgn]) return false;
    if(lvl && d.level!==lvl) return false;
    if(reuse==='Y' && !d.reusable) return false;
    return true;
  });

  document.getElementById('s-shown').textContent = filtered.length;

  const tbody = document.getElementById('tbody');
  if(!filtered.length){
    tbody.innerHTML = `<tr><td colspan="5" class="empty">검색 결과가 없습니다.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(d=>{
    const isActive = selected && selected.code===d.code;
    const cases = d.reusable && d.reuse_cases.length
      ? d.reuse_cases.map(c=>`<span class="reuse-pill">${c}</span>`).join(' ')
      : `<span style="color:var(--text3);font-size:12px">-</span>`;
    const actions = (d.actions||[]).map(a=>`<span class="action-tag">${a}</span>`).join('');
    return `<tr onclick="toggle('${d.code}')" class="${isActive?'active':''}">
      <td style="font-family:monospace;font-weight:600;font-size:12px">
        ${d.code}<br>
        <span class="badge lvl-${d.level}" style="margin-top:3px;display:inline-block">${d.level}</span>
      </td>
      <td>
        <div style="font-weight:500">${d.name_ko}</div>
        <div style="font-size:11px;color:var(--text2)">${d.name_en}</div>
      </td>
      <td style="white-space:normal">${cases}</td>
      <td style="white-space:normal;font-size:12px;color:var(--text2)">${d.message_ko}</td>
      <td style="white-space:normal">${actions||`<span style="color:var(--text3);font-size:12px">-</span>`}</td>
    </tr>`;
  }).join('');

  renderDetail();
}

function toggle(code){
  const d = allData.find(x=>x.code===code);
  selected = (selected && selected.code===code) ? null : d;
  render();
}

function renderDetail(){
  const panel = document.getElementById('detail');
  if(!selected){ panel.innerHTML=''; return; }
  const d = selected;
  const maps = MAPPINGS.filter(m=>m.error_code===d.code);
  const regions = ['K','A','T','J'];

  panel.innerHTML = `
    <div class="detail">
      <div class="detail-header">
        <div>
          <div class="detail-code">${d.code} &nbsp;<span class="badge lvl-${d.level}">${d.level}</span>&nbsp;<span style="font-size:12px;color:var(--text2)">HTTP ${d.http_status}</span></div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">${d.category} &nbsp;·&nbsp; 등록 ${d.registered_at} &nbsp;·&nbsp; 수정 ${d.updated_at}</div>
        </div>
        <button class="close-btn" onclick="selected=null;render()">닫기</button>
      </div>
      <div class="detail-grid">
        <div class="detail-field"><span class="field-key">에러명 (KO)</span><span class="field-val">${d.name_ko}</span></div>
        <div class="detail-field"><span class="field-key">에러명 (EN)</span><span class="field-val">${d.name_en}</span></div>
        <div class="detail-field">
          <span class="field-key">적용 권역</span>
          <span class="field-val" style="display:flex;gap:3px;flex-wrap:wrap;margin-top:2px">
            ${regions.map(r=>`<span class="rtag ${d.regions[r]?'r'+r:'rN'}">${r}</span>`).join('')}
          </span>
        </div>
        <div class="detail-field"><span class="field-key">원인</span><span class="field-val">${d.cause}</span></div>
        <div class="detail-field full">
          <span class="field-key">클라이언트 메시지 (KO)</span>
          <div class="msg-box">${d.message_ko}</div>
        </div>
        <div class="detail-field full">
          <span class="field-key">클라이언트 메시지 (EN)</span>
          <div class="msg-box" style="font-size:12px">${d.message_en}</div>
        </div>
        <div class="detail-field full">
          <span class="field-key">처리 Action</span>
          <div style="margin-top:4px">${(d.actions||[]).map(a=>`<span class="action-tag">${a}</span>`).join('')||'-'}</div>
        </div>
        <div class="detail-field full"><span class="field-key">처리 가이드 (개발용)</span><span class="field-val">${d.guide}</span></div>
      </div>
      ${d.reusable && maps.length ? `
      <div class="map-section">
        <div class="map-title">재사용 Case 매핑 (${maps.length}건)</div>
        ${maps.map(m=>`
          <div class="map-item">
            <div class="map-item-name">${m.case_id} — ${m.case_name}</div>
            <div class="map-item-meta">
              <span>권역: ${m.regions.join('/')}</span>
              <span>우선순위: ${m.priority}</span>
              <span>담당: ${m.owner}</span>
              <span style="color:var(--text3)">${m.trigger}</span>
            </div>
          </div>`).join('')}
      </div>` : ''}
    </div>`;
}

init();
</script>
</body>
</html>
